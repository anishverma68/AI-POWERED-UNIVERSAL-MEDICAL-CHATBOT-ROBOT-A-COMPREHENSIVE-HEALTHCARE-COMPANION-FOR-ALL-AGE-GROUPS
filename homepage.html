<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedProject — AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP NAV -->
  <header style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;">
    <div class="header-left">
      <div class="custom-lang-dropdown" id="lang-dropdown-wrapper">
        <button class="lang-dropdown-btn" onclick="toggleLangDropdown(event)">
          <span id="lang-active-text">English</span>
          <svg style="width:12px; height:12px; stroke:currentColor; stroke-width:2; fill:none;" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="lang-dropdown-menu" id="lang-dropdown-menu">
          <div class="lang-option active" onclick="selectLang(event, 'en', 'English')">English</div>
          <div class="lang-option" onclick="selectLang(event, 'ta', 'Tamil')">Tamil</div>
          <div class="lang-option" onclick="selectLang(event, 'hi', 'Hindi')">Hindi</div>
          <div class="lang-option" onclick="selectLang(event, 'te', 'Telugu')">Telugu</div>
        </div>
      </div>
    </div>

    <nav class="nav-tabs" style="justify-self: center;">
      <button class="nav-tab active" id="tab-chatbot" onclick="switchPanel('chatbot')">Chat</button>
      <button class="nav-tab" id="tab-reminders" onclick="switchPanel('reminders')">
        Reminders <span id="reminder-badge"
          style="display:none; background:#111827; color:#fff; border-radius:10px; padding:2px 6px; font-size:10px; margin-left:4px;">0</span>
      </button>
      <button class="nav-tab" id="tab-about" onclick="switchPanel('about')">About</button>
    </nav>

    <div class="header-right" style="justify-self: end;">
      <div class="user-profile">
        <div class="avatar">👨‍⚕️</div>
        <span>User</span>
      </div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="main-layout">

    <!-- Left Actions -->
    <aside class="left-actions">
      <button class="fab-btn" onclick="clearChat()">
        <span class="fab-icon">+</span>
      </button>
      <div class="fab-menu" onclick="clearChat()">
        <span class="fab-menu-icon">🗑️</span>
        <span class="fab-menu-text">Clear Chat</span>
      </div>
    </aside>


      <!-- About Panel -->
      <div class="panel-content" id="panel-about">
        <div class="panel-header">
          <h1>About MedProject</h1>
        </div>
        <div class="generic-panel">
          <p style="color:var(--text-muted); line-height:1.6; max-width:600px;">
            This is a local first health assistant. Our app stores all reminders on your device and provides instant
            information on common diseases without needing the internet.
            <br><br>
          </p>
        </div>
      </div>

    </section>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">

      <!-- History Chat -->
      <div class="history-card">
        <div class="sidebar-header">
          <h2>Chat<br>History</h2>
          <span style="color:var(--text-light); cursor:pointer;">📁</span>
        </div>
        <div class="history-list" id="history-list">
          <!-- History injected via JS -->
          <div class="history-item"><span style="color:var(--text-light)">💬</span> <span>Ask a question to start
              history</span></div>
        </div>
      </div>


  <!-- Scripts -->
  <script src="custom_translate.js"></script>
  <script src="disease_data.js"></script>
  <script src="reminders.js"></script>
  <script src="chatbot.js"></script>
  <script>
    // Tab switching logic matched to new HTML structure
    function switchPanel(panelId) {
      document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

      const panel = document.getElementById('panel-' + panelId);
      const tab = document.getElementById('tab-' + panelId);

      if (panel) panel.classList.add('active');
      if (tab) tab.classList.add('active');
    }

    // Capture and re-render history whenever a message is sent
    const _originalAddUserMsg = addUserMessage;
    window.addUserMessage = function (text) {
      _originalAddUserMsg(text);
      updateHistoryUI();
    };

    function updateHistoryUI() {
      const list = document.getElementById('history-list');
      const userQueries = chatHistory.filter(msg => msg.role === 'user');

      if (userQueries.length === 0) return;

      list.innerHTML = userQueries.slice(-6).reverse().map(msg => `
        <div class="history-item" onclick="document.getElementById('chat-input').value='${msg.text.replace(/'/g, "\\'")}'; autoResizeInput(document.getElementById('chat-input'));">
          <span style="color:var(--text-muted)">💬</span>
          <span>"${escapeHtml(msg.text)}"</span>
        </div>
      `).join('');
    }

    function clearChat() {
      if (confirm('Clear all chat messages?')) {
        document.getElementById('chat-messages').innerHTML = '';
        chatHistory = [];
        updateHistoryUI();
        initChatbot(); // Add welcome back
      }
    }

    // Reminders tie-in
    function updateReminderBadge() {
      const badge = document.getElementById('reminder-badge');
      const count = reminders.length;
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline-block';
        // Removed hardcoded backgroundColor logic to clear the bug
      } else {
        badge.style.display = 'none';
      }
    }

    const _originalRender = renderReminderList;
    window.renderReminderList = function () {
      _originalRender();
      updateReminderBadge();
    };

    // Override the generic addBotMessage template to match layout
    // Chatbot.js injects specific DOM, we will update chatbot.js to use new wrapper class structures.

    // Custom Language Dropdown Logic
    function toggleLangDropdown(e) {
      if(e) e.stopPropagation();
      document.getElementById('lang-dropdown-menu').classList.toggle('show');
    }
    
    function selectLang(e, code, name) {
      if(e) e.stopPropagation();
      document.getElementById('lang-active-text').innerText = name;
      
      const options = document.querySelectorAll('.lang-option');
      options.forEach(opt => opt.classList.remove('active'));
      e.target.classList.add('active');
      
      document.getElementById('lang-dropdown-menu').classList.remove('show');
      
      if (typeof changeLanguage === 'function') {
        changeLanguage(code);
      }
    }
    
    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('lang-dropdown-menu');
      if (menu && menu.classList.contains('show')) {
        menu.classList.remove('show');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      initChatbot();
      initReminders();
    });
  </script>
</body>

</html>
